<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="globals.css">
    <link rel="stylesheet" href="styleguide.css">
    <link rel="stylesheet" href="style.css">
    <title>Вход в аккаунт</title>
</head>
<body>
    <main class="macbook-pro">
        <div class="rectangle" aria-hidden="true"></div>
        <div class="div" aria-hidden="true"></div>
        <div class="rectangle-3" aria-hidden="true"></div>

        <div class="content-container">
            <h1 class="text-wrapper-3">Вход в аккаунт</h1>
            
            <form class="frame" action="" method="post">
                <img class="img" src="/images/Logo.png" alt="Логотип">
                
                <label class="frame-2">
                    <span class="screen-reader-text">Логин</span>
                    <input class="rectangle-2" type="text" name="login" autocomplete="username" placeholder="Введите свой логин" required>
                    <span class="text-wrapper" aria-hidden="true"></span>
                </label>
                
                <label class="frame-2">
                    <span class="screen-reader-text">Пароль</span>
                    <input class="rectangle-2" type="password" name="password" autocomplete="current-password" placeholder="Введите свой пароль" required>
                    <span class="text-wrapper" aria-hidden="true"></span>
                </label>
                
                <a class="text-wrapper-2" href="#">Нет аккаунта? Зарегистрироваться &gt;</a>
                <a class="text-wrapper-2" href="mainIndex.html">Продолжить в демоверсии &gt;</a>
            </form>
        </div>
    </main>
</body>
</html>
